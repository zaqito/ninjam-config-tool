# NINJAM Server Config File
# This is a template generated by ninjam-config-tool.
#
# Lines starting with # are comments.
#
# Full documentation at:
# https://www.cockos.com/ninjam/server-guide.php

# --- Basic Settings ---
# Port: The TCP port for the server to listen on. Default is 2049.
Port 2049

# MaxUsers: Maximum number of users allowed.
MaxUsers 10


# --- Jam Settings ---
# DefaultBPM: Default server BPM (range 20 to 400)
DefaultBPM 120.0

# DefaultBPI: Default server BPI (range 2 to 1024)
DefaultBPI 16

# DefaultTopic: Default server topic message (shown on connect)
DefaultTopic Welcome to this NINJAM server!


# --- Anonymous Users ---
# AnonymousUsers: 'yes' to allow anonymous users, 'no' to require login.
AnonymousUsers yes

# AnonymousUsersCanChat: 'yes' to allow anonymous users to chat.
AnonymousUsersCanChat yes

# AllowHiddenUsers: 'yes' allows users with no channels to be hidden.
AllowHiddenUsers no


# --- Advanced Settings (To be managed by this tool) ---
#
# User username password [permissions]
# Example: User admin pass123 *
# Example: User guest pass guest C
#
# ACL mask allow|deny|reserve
# Example: ACL 192.168.0.0/16 allow
# Example: ACL 1.2.3.4/32 deny